<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raja Gacha - BANDAR ONLINE TERPERCAYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
       /* Custom scrollbar hiding */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes slot-spin {
        0% { transform: translateY(0); }
        100% { transform: translateY(-100%); }
      }
      .slot-reel-container {
        mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
      }
      
      /* JUDOL VIBES ANIMATION */
      @keyframes blink {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.02); }
      }
      .animate-blink {
        animation: blink 0.5s infinite;
      }

      @keyframes rgb-border {
        0% { border-color: red; box-shadow: 0 0 5px red; }
        25% { border-color: yellow; box-shadow: 0 0 5px yellow; }
        50% { border-color: lime; box-shadow: 0 0 5px lime; }
        75% { border-color: cyan; box-shadow: 0 0 5px cyan; }
        100% { border-color: red; box-shadow: 0 0 5px red; }
      }
      .rgb-border {
        animation: rgb-border 1.5s linear infinite;
      }

      @keyframes sheen {
        0% { transform: translateX(-100%) skewX(-15deg); }
        100% { transform: translateX(200%) skewX(-15deg); }
      }
      .sheen {
        position: relative;
        overflow: hidden;
      }
      .sheen::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;
        height: 100%;
        background: rgba(255,255,255,0.2);
        transform: translateX(-100%) skewX(-15deg);
        animation: sheen 2s infinite;
      }

      .bg-pattern {
        background-color: #050505;
        background-image: 
            linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 30px 30px;
      }
    </style>
